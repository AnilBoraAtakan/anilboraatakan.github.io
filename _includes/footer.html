<footer class="site-footer" id="contact">
  <div class="container">
    <div class="footer">
      <div class="footer__left">
        <div class="footer__name">{{ site.author.name }}</div>
        <div class="footer__meta">
          <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
          <span class="sep">/</span>
          <a href="{{ site.social.github }}" target="_blank" rel="me">GitHub</a>
          <span class="sep">/</span>
          <a href="{{ site.social.linkedin }}" target="_blank" rel="me">LinkedIn</a>
        </div>
      </div>
      <div class="footer__right">
        <div class="footer__small">{{ site.description }}</div>
      </div>
    </div>
  </div>
</footer>
